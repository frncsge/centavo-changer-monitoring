<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transactions</title>
<link rel="stylesheet" href="transactions.css">
</head>

<body>

<div class="sidebar">
    <h2>IoT Dashboard</h2>
    <ul>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li class="active"><a href="#">Transactions</a></li>
        <li><a href="storage.html">Coin Inventory</a></li>
        <li><a href="#">Machine Status</a></li>
    </ul>
</div>

<div class="main">

<!-- Topbar -->
<div class="topbar">
<h1>Transaction Records</h1>
<div class="status">System Online</div>
</div>

<div class="header-top">
    <div>
        <p>Complete history of all coin changing transactions</p>
    </div>

    <div class="header-actions">
        <button class="add-btn">+ Add Transaction</button>
    </div>
</div>

<div class="table-box">

<table>
<thead>
<tr>
<th>TRANSACTION ID</th>
<th>25¢ COINS</th>
<th>PESO VALUE</th>
<th>COINS DISPENSED</th>
<th>TIMESTAMP</th>
<th>STATUS</th>
<th>ACTIONS</th>
</tr>
</thead>

<tbody id="transactionTable">
<!-- Dynamic rows go here -->
</tbody>

</table>

</div>

</div>

<!-- ✅ SCRIPT AT BOTTOM -->
<script>
async function loadTransactions() {
    try {
        const tableBody = document.getElementById("transactionTable");

        if (!tableBody) {
            console.error("No tbody found!");
            return;
        }

        // Clear old data
        tableBody.innerHTML = "";

        const res = await fetch("http://localhost:3000/api/transactions");

        if (!res.ok) {
            console.error("Fetch failed:", res.status, res.statusText);
            return;
        }

        const data = await res.json();
        const transactions = data.transactions;

        console.log("Transactions fetched:", transactions);

        transactions.forEach((txn) => {
            const row = document.createElement("tr");

            // Compute peso value (25 cents * count)
            const pesoValue = (txn.centavos_25_inserted * 0.25).toFixed(2);

            // Example logic for coins dispensed
            let dispensedHTML = "";
            let remaining = pesoValue;

            if (remaining >= 20) {
                const count = Math.floor(remaining / 20);
                dispensedHTML += `<span class="tag purple">₱20 × ${count}</span>`;
                remaining -= count * 20;
            }
            if (remaining >= 10) {
                const count = Math.floor(remaining / 10);
                dispensedHTML += `<span class="tag green">₱10 × ${count}</span>`;
                remaining -= count * 10;
            }
            if (remaining >= 5) {
                const count = Math.floor(remaining / 5);
                dispensedHTML += `<span class="tag blue">₱5 × ${count}</span>`;
                remaining -= count * 5;
            }
            if (remaining >= 1) {
                const count = Math.floor(remaining / 1);
                dispensedHTML += `<span class="tag">₱1 × ${count}</span>`;
                remaining -= count;
            }

            row.innerHTML = `
                <td>${txn.transaction_id}</td>
                <td>${txn.centavos_25_inserted}</td>
                <td class="peso">₱${pesoValue}</td>
                <td>${dispensedHTML}</td>
                <td>${txn.transaction_date_time}</td>
                <td><span class="status">completed</span></td>
                <td class="actions">✏️ 🗑️</td>
            `;

            tableBody.appendChild(row);
        });

    } catch (err) {
        console.error("Error loading transactions:", err);
    }
}

// Run after page loads
window.onload = loadTransactions;
</script>

</body>
</html>
