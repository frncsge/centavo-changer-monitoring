<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../style/settings/totpModal.css" />
    <title>Settings</title>
  </head>
  <body>
    <button id="enable-totp">Enable TOTP</button>
    <button id="logout-btn">logout</button>
    <div id="TOTP-modal-backdrop">
      <div id="TOTP-modal">
        <section id="TOTP-qr-section">
          <h2>Scan this QR code in your authenticator app</h2>
          <img id="qr-code" src="#" alt="QR code for registering TOTP" />
        </section>
        <section id="TOTP-code-section">
          <label for="TOTP-code-input"
            >Enter code from your authenticator app</label
          >
          <input id="TOTP-code-input" type="text" />
          <button id="verify-otp-btn">Verify</button>
        </section>
        <section id="prev-next-btn-section">
          <button id="prev-btn">Prev</button>
          <button id="next-btn">Next</button>
        </section>
      </div>
    </div>
  </body>
  <script type="module" src="../../js/pages/settings.js"></script>
  <script type="module" src="../../js/pages/logout.js"></script>
</html>
