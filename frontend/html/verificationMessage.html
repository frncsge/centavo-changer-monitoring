<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verification Message</title>
    <link rel="stylesheet" href="../style/verificationMessage.css" />
  </head>
  <body>
  <div class="wrapper">
    <div class="card" id="success">
      <div class="icon">📧</div>
      <h1>Account Verified</h1>
      <p>Your email has been successfully verified. You can now access your dashboard.</p>
      <a href="./dashboard.html" class="btn">Go to Dashboard</a>
    </div>

    <div class="card" id="failed">
      <div class="icon">⚠️</div>
      <h1>Verification Failed</h1>
      <p>Invalid or expired link. Please try logging in again.</p>
      <a href="./login.html" class="btn error">Login</a>
    </div>
  </div>
    <script type="module" src="../js/auth/verificationMessage.js"></script>
  </body>
</html>
