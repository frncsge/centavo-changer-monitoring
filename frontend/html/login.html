<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Changer Login</title>
    <link rel="stylesheet" href="../style/login.css" />
  </head>
  <body>
    <div>
      <div class="container">
        <h2>Coin Changer Monitor</h2>
        <div class="subtitle">IoT-Enabled Admin Dashboard</div>

        <div class="input-group">
          <label>Username</label>
          <input id="username" type="text" placeholder="admin" />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input id="password" type="password" placeholder="password" />
        </div>
        <p class="auth-message-display"></p>
        <button id="login-btn" class="btn">Login</button>
        <p class="create">
          Not registered? <a href="create.html">Create an Account</a>
        </p>
      </div>

      <div class="footer">
        Automated Coin Changing Machine Monitoring System
      </div>
    </div>

    <script type="module" src="../js/auth/login.js"></script>
  </body>
</html>
