<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Changetavo Create Account</title>
    <link rel="stylesheet" href="../style/create.css" />
  </head>
  <body>
    <div>
      <div class="container">
        <h2>Coin Changer Monitor</h2>
        <div class="subtitle">IoT-Enabled Admin Dashboard</div>

        <div class="input-group">
          <label>Account name</label>
          <input id="account-name" type="text" placeholder="admin" />
        </div>

        <div class="input-group">
          <label>Email</label>
          <input id="email" type="text" placeholder="example@gmail.com" />
        </div>

        <div class="input-group">
          <label>Password</label>
          <input id="password" type="password" placeholder="example123" />
        </div>

        <p class="auth-message-display"></p>
        <button id="signup-btn" class="btn">Create</button>
        <p class="create">
          Already have an account? <a href="login.html">Login</a>
        </p>
      </div>

      <div class="footer">
        Automated Coin Changing Machine Monitoring System
      </div>
    </div>

    <script type="module" src="../js/auth/signup.js"></script>
  </body>
</html>
